<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kai Le Me · meeting log</title>
<link rel="icon" type="image/png" href="assets/app-icon.png">
<link rel="apple-touch-icon" href="assets/app-icon.png">
<style>
  :root{
    --accent:#2563eb; --accent-2:#3b82f6; --accent-soft:#e8effc;
    --ink:#16161a; --muted:#6b7280; --line:#e8e8ec; --bg:#f6f6f8; --card:#fff;
    --sh-sm:0 1px 2px rgba(16,16,26,.05);
    --sh-md:0 4px 14px rgba(16,16,26,.07);
    --sh-lg:0 12px 34px rgba(16,16,26,.11);
    --r-s:9px; --r-m:14px; --r-l:20px;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",
    "PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);
    line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased;
    background:#0b1437;
    background-image:
      radial-gradient(40rem 40rem at 12% 18%,rgba(59,130,246,.55),transparent 60%),
      radial-gradient(38rem 38rem at 88% 12%,rgba(99,102,241,.50),transparent 60%),
      radial-gradient(42rem 42rem at 75% 88%,rgba(14,165,233,.45),transparent 62%),
      radial-gradient(36rem 36rem at 22% 85%,rgba(37,99,235,.50),transparent 60%);
    background-attachment:fixed;background-size:200% 200%;
    animation:aurora 26s ease-in-out infinite}
  @keyframes aurora{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
  .wrap{max-width:1000px;margin:0 auto;padding:26px 22px 60px}
  .hero{position:relative;overflow:hidden;border-radius:var(--r-l);
    color:#fff;padding:40px 30px 34px;margin-bottom:24px}
  .hero::after{content:"";position:absolute;right:-70px;top:-70px;width:240px;
    height:240px;border-radius:50%;background:rgba(255,255,255,.08)}
  .hero::before{content:"";position:absolute;right:60px;bottom:-90px;width:170px;
    height:170px;border-radius:50%;background:rgba(255,255,255,.06)}
  .hero h1{font-size:30px;letter-spacing:2px;font-weight:800;display:flex;
    align-items:center;gap:12px}
  .hero .ic{width:38px;height:38px;display:inline-flex;align-items:center;
    justify-content:center;background:transparent}
  .hero .ic img{width:100%;height:100%;object-fit:contain;
    filter:drop-shadow(0 2px 6px rgba(20,30,80,.28))}
  .hero p{margin-top:7px;opacity:.92;font-size:14px;letter-spacing:.3px}
  .hero-stats{display:flex;gap:26px;margin-top:22px;flex-wrap:wrap;
    position:relative;z-index:1}
  .hs{display:flex;flex-direction:column}
  .hs .n{font-size:30px;font-weight:800;line-height:1}
  .hs .l{font-size:12px;opacity:.85;margin-top:5px;letter-spacing:.5px}
  .hero-tools{position:absolute;top:24px;right:26px;display:flex;gap:8px;z-index:2}
  .hero-tools button{background:rgba(255,255,255,.15);border:1px solid
    rgba(255,255,255,.25);color:#fff;font:inherit;font-size:13px;
    padding:6px 12px;border-radius:8px;cursor:pointer;
    transition:background .2s var(--ease),transform .15s var(--ease)}
  .hero-tools button:hover{background:rgba(255,255,255,.28);transform:translateY(-1px)}
  .lang-btn{font-weight:700}
  .tabs{display:flex;gap:2px;margin:0 4px 20px;position:relative;flex-wrap:wrap}
  .tab{padding:11px 20px;border:none;background:none;color:rgba(255,255,255,.72);
    font:inherit;font-size:15px;cursor:pointer;border-radius:10px 10px 0 0;
    position:relative;transition:color .22s var(--ease)}
  .tab:hover{color:#fff}
  .tab.active{color:#fff;font-weight:650}
  .tab::after{content:"";position:absolute;left:14px;right:14px;bottom:0;
    height:3px;border-radius:3px;background:#fff;transform:scaleX(0);
    transform-origin:center;transition:transform .28s var(--ease)}
  .tab.active::after{transform:scaleX(1)}
  .tabs-line{height:1px;background:rgba(255,255,255,.25);margin:-22px 0 22px;border-radius:2px}
  section{animation:rise .42s var(--ease)}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .reveal{opacity:0;transform:translateY(48px) scale(.965);
    will-change:transform,opacity;
    transition:opacity .8s var(--ease),transform .8s var(--ease)}
  .reveal.in{opacity:1;transform:none}
  .card{background:rgba(255,255,255,.82);
    -webkit-backdrop-filter:blur(18px) saturate(150%);
    backdrop-filter:blur(18px) saturate(150%);
    border:1px solid rgba(255,255,255,.6);
    border-radius:var(--r-m);padding:24px;margin-bottom:18px;
    box-shadow:0 10px 34px rgba(7,18,55,.28);
    transition:transform .3s var(--ease),box-shadow .3s var(--ease)}
  .card{transition:box-shadow .25s var(--ease)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;
    font-weight:550;letter-spacing:.2px}
  input,select,textarea{font:inherit;width:100%;padding:11px 13px;
    border:1.5px solid var(--line);border-radius:var(--r-s);background:#fff;
    color:var(--ink);transition:border-color .2s var(--ease),box-shadow .2s var(--ease)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);
    box-shadow:0 0 0 4px var(--accent-soft)}
  textarea{resize:vertical;min-height:66px}
  .field{margin-bottom:16px}
  .row{display:flex;gap:18px;align-items:center}
  .radio{display:flex;gap:18px;align-items:center}
  .radio span{display:flex;align-items:center;gap:6px;font-size:14px;
    color:var(--ink);cursor:pointer}
  .radio input{width:auto}
  .hidden{display:none!important}
  .formfoot{display:flex;gap:10px;margin-top:8px}
  button,.btn{font:inherit;cursor:pointer;border:1.5px solid var(--line);
    background:var(--card);color:var(--ink);padding:9px 16px;border-radius:var(--r-s);
    font-weight:550;transition:border-color .2s var(--ease),color .2s var(--ease),
    background .2s var(--ease),transform .14s var(--ease),box-shadow .2s var(--ease)}
  button:hover{border-color:var(--accent);color:var(--accent);
    transform:translateY(-1px);box-shadow:var(--sh-sm)}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.primary:hover{background:var(--accent-2);color:#fff;
    box-shadow:0 6px 18px rgba(37,99,235,.32)}
  button.danger{color:#b00020;border-color:#f0c4c9}
  button.danger:hover{background:#fff0f1;color:#b00020;border-color:#e89aa3}
  button:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;
    border-color:var(--line);color:var(--ink)}
  .rowbtn{font-size:12.5px;padding:5px 11px}
  .filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:end}
  .filters .field{margin:0;min-width:150px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);
    vertical-align:top}
  th{font-size:11.5px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.7px;font-weight:600}
  tbody tr{transition:background .16s var(--ease)}
  tbody tr:hover td{background:#eef3fc}
  .pill{display:inline-block;font-size:12px;padding:3px 11px;border-radius:20px;
    background:var(--accent-soft);color:var(--accent);white-space:nowrap;font-weight:600}
  .pill.on{background:#e7f0fb;color:#1c5d9e}
  .pill.off{background:#eaf3e6;color:#476b32}
  .meta{color:var(--muted);font-size:12px}
  .empty{text-align:center;color:var(--muted);padding:50px 20px}
  .empty .big{font-size:40px;margin-bottom:10px;opacity:.5}
  .stats-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
  .stat{background:rgba(255,255,255,.82);
    -webkit-backdrop-filter:blur(18px) saturate(150%);
    backdrop-filter:blur(18px) saturate(150%);
    border:1px solid rgba(255,255,255,.6);border-radius:var(--r-m);
    padding:20px 18px;box-shadow:0 10px 30px rgba(7,18,55,.26);
    transition:transform .25s var(--ease),box-shadow .25s var(--ease)}
  .stat{cursor:pointer}
  .stat:hover{box-shadow:0 12px 30px rgba(7,18,55,.24);border-color:var(--accent-2)}
  .stat .n{font-size:34px;color:var(--accent);font-weight:800;line-height:1}
  .stat .l{font-size:12.5px;color:var(--muted);margin-top:7px;font-weight:550}
  .chart-title{font-size:14.5px;font-weight:700;margin-bottom:18px}
  .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:13px}
  .bar-row .lab{width:140px;text-align:right;color:var(--muted);flex-shrink:0}
  .bar-track{flex:1;background:#eef0f3;border-radius:6px;height:22px;overflow:hidden}
  .bar-fill{background:linear-gradient(90deg,var(--accent),var(--accent-2));
    height:100%;border-radius:6px;width:0;transition:width .7s var(--ease)}
  .bar-row .val{width:36px;text-align:left;color:var(--ink);flex-shrink:0;font-weight:650}
  .month-chart{display:flex;align-items:flex-end;gap:8px;height:172px;
    padding:12px 0;border-bottom:1px solid var(--line)}
  .mbar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;
    height:100%;justify-content:flex-end}
  .mbar .fill{width:64%;background:linear-gradient(180deg,var(--accent-2),
    var(--accent));border-radius:5px 5px 0 0;height:0;transition:height .65s var(--ease)}
  .mbar:hover .fill{filter:brightness(1.12)}
  .mbar .mn{font-size:11px;color:var(--muted)}
  .mbar .mv{font-size:11px;color:var(--ink);font-weight:650;height:14px}
  .heatmap{overflow-x:auto;padding:4px 0 2px}
  .hm-wrap{min-width:max-content}
  .hm-months{display:flex;gap:3px;margin-bottom:5px}
  .hm-mc{width:13px;font-size:10px;color:var(--muted);white-space:nowrap;
    overflow:visible;flex:0 0 13px}
  .hm-grid{display:flex;gap:3px;min-width:max-content}
  .hm-col{display:flex;flex-direction:column;gap:3px}
  .hm-c{width:13px;height:13px;border-radius:3px;background:rgba(37,99,235,.09)}
  .hm-c.l1{background:rgba(37,99,235,.32)}
  .hm-c.l2{background:rgba(37,99,235,.54)}
  .hm-c.l3{background:rgba(37,99,235,.76)}
  .hm-c.l4{background:rgba(37,99,235,.98)}
  .hm-legend{display:flex;align-items:center;gap:5px;justify-content:flex-end;
    font-size:11px;color:var(--muted);margin-top:12px}
  .hm-legend .hm-c{width:11px;height:11px}
  .vac{flex:1;position:relative}
  .vac-box{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:50;
    background:rgba(255,255,255,.97);backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:12px;overflow:hidden;
    box-shadow:var(--sh-md);max-height:230px;overflow-y:auto}
  .vac-item{padding:9px 13px;font-size:13px;color:var(--ink);cursor:pointer;
    border-bottom:1px solid var(--line);line-height:1.45}
  .vac-item:last-child{border-bottom:none}
  .vac-item:hover{background:var(--accent-soft)}
  /* ---- list grid ---- */
  .ltable{font-size:13px}
  .lcols{--gt:118px 116px minmax(150px,1.5fr) minmax(120px,1.3fr) 92px;
    display:grid;grid-template-columns:var(--gt);gap:14px;align-items:center}
  .lhead{position:sticky;top:0;z-index:6;padding:9px 8px;
    background:rgba(244,247,253,.96);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    border-bottom:1.5px solid var(--line);
    font-size:11px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.6px;font-weight:700;border-radius:8px 8px 0 0}
  .lmon{position:sticky;top:38px;z-index:5;
    background:rgba(232,239,252,.97);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    padding:7px 10px;font-size:12px;font-weight:700;color:var(--accent);
    border-bottom:1px solid rgba(37,99,235,.18);
    display:flex;justify-content:space-between;align-items:center}
  .lmon .mc{font-weight:600;color:var(--muted)}
  .lrow{padding:9px 8px;border-bottom:1px solid var(--line);
    cursor:pointer;transition:background .14s var(--ease)}
  .lrow:hover{background:#eef3fc}
  .lrow>span{min-width:0;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap;display:block}
  .lrow .ld{color:var(--muted);font-variant-numeric:tabular-nums}
  .lrow .lnm{font-weight:600;color:var(--ink)}
  .lrow .lpv,.lrow .lrl{color:var(--muted)}
  .more-btn{display:block;margin:16px auto 2px;padding:9px 22px}
  .seg{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .seg button{font-size:12px;padding:5px 11px;border-radius:999px}
  .seg button.on{background:var(--accent-2);color:#fff;border-color:var(--accent-2)}
  .view-tog{display:flex;gap:6px}
  .view-tog button{font-size:12.5px;padding:6px 14px;border-radius:999px}
  .view-tog button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .dayhead{font-size:14px;font-weight:700;color:var(--ink);
    padding:6px 2px 12px;display:flex;align-items:center;gap:8px}
  .dayhead .mc{color:var(--muted);font-weight:600;font-size:12.5px}
  /* ---- detail drawer ---- */
  .drawer-bg{position:fixed;inset:0;background:rgba(8,14,40,.46);z-index:120;
    opacity:0;pointer-events:none;transition:opacity .26s var(--ease)}
  .drawer-bg.show{opacity:1;pointer-events:auto}
  #recDrawer{position:fixed;top:0;right:0;height:100%;width:430px;max-width:92vw;
    z-index:121;background:rgba(255,255,255,.94);
    -webkit-backdrop-filter:blur(20px) saturate(150%);
    backdrop-filter:blur(20px) saturate(150%);
    border-left:1px solid rgba(255,255,255,.7);
    box-shadow:-14px 0 44px rgba(7,18,55,.32);
    transform:translateX(102%);transition:transform .3s var(--ease);
    display:flex;flex-direction:column}
  #recDrawer.show{transform:none}
  .dr-hd{display:flex;align-items:center;justify-content:space-between;
    padding:20px 22px 14px;border-bottom:1px solid var(--line)}
  .dr-hd .t{font-size:16px;font-weight:800;color:var(--accent);
    letter-spacing:.4px}
  .dr-x{border:none;background:none;font-size:21px;line-height:1;
    color:var(--muted);padding:4px 8px;border-radius:8px}
  .dr-x:hover{color:var(--accent);background:var(--accent-soft);transform:none}
  .dr-bd{padding:18px 22px;overflow-y:auto;flex:1}
  .dr-sec{margin-bottom:16px}
  .dr-sec .k{font-size:11px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.6px;font-weight:700;margin-bottom:5px}
  .dr-sec .v{font-size:14px;color:var(--ink);line-height:1.65;
    word-break:break-word;white-space:pre-wrap}
  .dr-sec.notes .v{max-height:42vh;overflow-y:auto}
  .dr-sec a{color:var(--accent);word-break:break-all}
  .dr-ft{display:flex;gap:9px;padding:16px 22px;border-top:1px solid var(--line);
    flex-wrap:wrap}
  .dr-ft button{font-size:13px;padding:8px 14px}
  /* ---- calendar ---- */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;
    margin-bottom:14px}
  .cal-nav .ttl{font-size:15px;font-weight:700}
  .cal-nav button{padding:6px 13px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-wd{font-size:11px;color:var(--muted);text-align:center;
    font-weight:700;padding:4px 0;text-transform:uppercase;letter-spacing:.5px}
  .cal-cell{min-height:64px;border:1px solid var(--line);border-radius:9px;
    padding:6px 7px;background:rgba(255,255,255,.55);position:relative;
    transition:background .14s var(--ease),border-color .14s var(--ease)}
  .cal-cell.empty{background:transparent;border:none}
  .cal-cell.has{cursor:pointer}
  .cal-cell.has:hover{background:#eef3fc;border-color:var(--accent-2)}
  .cal-cell.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .cal-cell .dn{font-size:12px;color:var(--muted);font-weight:650}
  .cal-cell.has .dn{color:var(--ink)}
  .cal-badge{position:absolute;right:6px;bottom:6px;font-size:10.5px;
    min-width:18px;height:18px;padding:0 5px;border-radius:999px;
    background:var(--accent);color:#fff;font-weight:700;
    display:flex;align-items:center;justify-content:center}
  .bz-k{color:var(--muted);font-weight:600;margin-right:6px}
  .bz-v{font-weight:700;color:var(--accent)}
  .sync-info{font-size:11.5px;color:rgba(255,255,255,.78);align-self:center}
  .set-sync-info{font-size:12px;color:var(--muted);margin:2px 0 16px}
  .dup-hint{font-size:12px;color:#7a5b16;background:#fff7e8;
    border:1px solid #f0dba8;border-radius:8px;padding:8px 12px;
    margin-top:10px;display:none}
  .dup-hint.show{display:block}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  button:focus-visible,.tab:focus-visible{outline:2px solid #fff;outline-offset:2px}
  @media(max-width:620px){
    .lcols{--gt:84px 1.4fr 78px;gap:10px}
    .lrow .lty,.lrow .lpv{display:none}
    #recDrawer{width:100%;max-width:100%;top:auto;bottom:0;height:86vh;
      border-left:none;border-top:1px solid rgba(255,255,255,.7);
      border-radius:18px 18px 0 0;transform:translateY(102%);
      box-shadow:0 -14px 44px rgba(7,18,55,.32)}
    #recDrawer.show{transform:none}
    .cal-cell{min-height:48px}
  }
  .note{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.6}
  .banner{font-size:13px;padding:12px 15px;border-radius:10px;margin-bottom:16px;line-height:1.6}
  .banner.warn{background:#fff7e8;border:1px solid #f0dba8;color:#7a5b16}
  .banner.ok{background:#eaf6ea;border:1px solid #b7dcb9;color:#2e7d32}
  .imp-item{display:flex;gap:11px;align-items:flex-start;padding:11px 12px;
    border-bottom:1px solid var(--line);font-size:14px;border-radius:8px;
    transition:background .15s var(--ease)}
  .imp-item:hover{background:#fafafa}
  .imp-item input{width:auto;margin-top:3px}
  code{background:#efeef1;padding:2px 6px;border-radius:5px;font-size:12.5px}
  .map-row{margin-bottom:9px}
  #toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:13px 22px;border-radius:11px;font-size:14px;
    box-shadow:var(--sh-lg);opacity:0;pointer-events:none;
    transition:opacity .3s var(--ease),transform .3s var(--ease);z-index:90;max-width:88vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.ok{background:#1f7a3a}#toast.err{background:#9c2230}
  .modal-bg{position:fixed;inset:0;background:rgba(16,16,26,.45);display:flex;
    align-items:center;justify-content:center;z-index:100;opacity:0;
    pointer-events:none;transition:opacity .25s var(--ease)}
  .modal-bg.show{opacity:1;pointer-events:auto}
  .modal{background:#fff;border-radius:var(--r-m);padding:24px;max-width:380px;
    width:90%;box-shadow:var(--sh-lg);transform:scale(.94);
    transition:transform .25s var(--ease)}
  .modal-bg.show .modal{transform:scale(1)}
  .modal p{font-size:15px;margin-bottom:20px}
  .modal .mf{display:flex;gap:10px;justify-content:flex-end}
  #authGate{position:fixed;inset:0;z-index:200;display:flex;
    align-items:flex-start;justify-content:center;
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:24px 16px calc(24px + env(safe-area-inset-bottom))}
  #authGate .auth-card{background:rgba(255,255,255,.86);
    -webkit-backdrop-filter:blur(20px) saturate(150%);
    backdrop-filter:blur(20px) saturate(150%);
    border:1px solid rgba(255,255,255,.6);border-radius:var(--r-l);
    box-shadow:0 16px 50px rgba(7,18,55,.34);
    padding:34px 30px;width:340px;max-width:92vw;text-align:center;
    margin:auto 0}
  #authGate .auth-logo{font-size:40px;margin-bottom:6px}
  #authGate .auth-title{font-size:21px;font-weight:800;color:var(--accent);
    letter-spacing:1px;margin-bottom:6px}
  #authGate .auth-note{font-size:12.5px;color:var(--muted);
    margin-bottom:18px;line-height:1.6}
  #authGate input{margin-bottom:12px;font-size:16px}
  #authGate button{width:100%;margin-bottom:10px;min-height:46px}
  @media(max-width:680px){.grid,.stats-cards{grid-template-columns:1fr}
    .bar-row .lab{width:96px}.hero-tools{position:static;margin-top:14px}
    .hero{padding:22px}}
  @media print{
    body{background:#fff;animation:none}

<body>
<div id="authGate" class="hidden">
  <div class="auth-card">
    <div class="auth-logo">🗓️</div>
    <div class="auth-title" data-i18n="auth.title"></div>
    <div class="auth-note" data-i18n="auth.note"></div>
    <input id="au-email" type="email" data-ph="auth.email" autocomplete="username">
    <input id="au-pw" type="password" data-ph="auth.pw" autocomplete="current-password">
    <button class="primary" data-i18n="auth.signIn" onclick="doSignIn()"></button>
    <button data-i18n="auth.signUp" onclick="doSignUp()"></button>
  </div>
</div>
<div class="wrap">
  <div class="hero">
    <div class="hero-tools">
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">中</button>
      <span class="sync-info hidden" id="syncInfo"></span>
      <button id="syncBtn" class="hidden" data-i18n="syncNow" onclick="manualSync()"></button>
      <button id="loginBtn" class="hidden" data-i18n="auth.signIn" onclick="openAuthGate()"></button>
      <button id="signOutBtn" class="hidden" data-i18n="signOut" onclick="doSignOut()"></button>
      <button data-i18n="exportBackup" onclick="exportJSON()"></button>
      <button data-i18n="exportCsv" onclick="exportCSV()"></button>
      <button data-i18n="importBackup" onclick="document.getElementById('importFile').click()"></button>
      <input type="file" id="importFile" accept="application/json" class="hidden" onchange="importJSON(event)">
    </div>
    <h1><span class="ic"><img src="assets/app-icon.png" alt=""></span><span data-i18n="brand"></span></h1>
    <p data-i18n="tagline"></p>
    <div class="hero-stats" id="heroStats"></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="add" data-i18n="tab.add" onclick="switchTab('add')"></button>
    <button class="tab" data-tab="list" onclick="switchTab('list')"><span data-i18n="tab.list"></span> <span id="cnt"></span></button>
    <button class="tab" data-tab="stat" data-i18n="tab.stat" onclick="switchTab('stat')"></button>
    <button class="tab" data-tab="set" data-i18n="tab.set" onclick="switchTab('set')"></button>
  </div>
  <div class="tabs-line"></div>

  <section id="tab-add">
    <div class="card">
      <input type="hidden" id="editId">
      <div class="grid">
        <div class="field"><label data-i18n="f.type"></label>
          <select id="f-type" onchange="applyTypeDefault()">
            <option value="组会" data-i18n="ty.组会"></option>
            <option value="组内报告" data-i18n="ty.组内报告"></option>
            <option value="Project meeting" data-i18n="ty.Project meeting"></option>
            <option value="seminar" data-i18n="ty.seminar"></option>
            <option value="conference" data-i18n="ty.conference"></option>
            <option value="其他" data-i18n="ty.其他"></option>
          </select></div>
        <div class="field"><label data-i18n="f.name"></label>
          <input id="f-name" data-ph="f.nameph" oninput="checkDup()"></div>
      </div>
      <div class="grid">
        <div class="field"><label data-i18n="f.start"></label>
          <input type="date" id="f-dateStart" onchange="checkDup()"></div>
        <div class="field"><label data-i18n="f.end"></label>
          <input type="date" id="f-dateEnd"></div>
      </div>
      <div class="grid">
        <div class="field"><label data-i18n="f.repeat"></label>
          <select id="f-repeat">
            <option value="none" data-i18n="rep.none"></option>
            <option value="weekday" data-i18n="rep.weekday"></option>
            <option value="daily" data-i18n="rep.daily"></option>
            <option value="weekly" data-i18n="rep.weekly"></option>
            <option value="monthly" data-i18n="rep.monthly"></option>
          </select></div>
        <div class="field"><label data-i18n="f.repeatUntil"></label>
          <input type="date" id="f-repeatUntil"></div>
      </div>
      <div class="field"><label data-i18n="f.loc"></label>
        <div class="row">
          <div class="radio">
            <span><input type="radio" name="venue" value="线上" id="v-on" onchange="toggleVenue()"><span data-i18n="online"></span></span>
            <span><input type="radio" name="venue" value="线下" id="v-off" onchange="toggleVenue()"><span data-i18n="offline"></span></span>
          </div>
          <div class="vac">
            <input id="f-venueDetail" style="width:100%" autocomplete="off"
              oninput="venueLookup()" onblur="hideVac()">
            <div id="vacBox" class="vac-box hidden"></div>
          </div>
        </div>
      </div>
      <div class="field hidden" id="roleField"><label data-i18n="f.role"></label>
        <select id="f-role">
          <option value="" data-i18n="ro.none"></option>
          <option value="oral" data-i18n="ro.oral"></option>
          <option value="poster" data-i18n="ro.poster"></option>
          <option value="attendee" data-i18n="ro.attendee"></option>
          <option value="chair" data-i18n="ro.chair"></option>
          <option value="其他" data-i18n="ro.其他"></option>
        </select></div>
      <div class="field"><label data-i18n="f.notes"></label>
        <textarea id="f-notes"></textarea></div>
      <div id="dupHint" class="dup-hint" data-i18n="dup.hint"></div>
      <div class="formfoot">
        <button class="primary" data-i18n="save" onclick="saveRecord()"></button>
        <button onclick="resetForm()" id="cancelBtn" class="hidden" data-i18n="cancelEdit"></button>
      </div>
    </div>
  </section>

  <section id="tab-list" class="hidden">
    <div class="card">
      <div class="filters" style="margin-bottom:12px">
        <div class="field"><label data-i18n="l.year"></label>
          <select id="flt-year" onchange="renderList()"></select></div>
        <div class="field"><label data-i18n="l.month"></label>
          <select id="flt-month" onchange="renderList()"></select></div>
        <div class="field"><label data-i18n="l.type"></label>
          <select id="flt-type" onchange="renderList()">
            <option value="" data-i18n="all"></option>
            <option value="组会" data-i18n="ty.组会"></option>
            <option value="组内报告" data-i18n="ty.组内报告"></option>
            <option value="Project meeting" data-i18n="ty.Project meeting"></option>
            <option value="seminar" data-i18n="ty.seminar"></option>
            <option value="conference" data-i18n="ty.conference"></option>
            <option value="其他" data-i18n="ty.其他"></option>
          </select></div>
        <div class="field"><label data-i18n="l.sort"></label>
          <select id="flt-sort" onchange="renderList()">
            <option value="dd" data-i18n="sort.dd"></option>
            <option value="da" data-i18n="sort.da"></option>
            <option value="nm" data-i18n="sort.nm"></option>
          </select></div>
        <div class="field" style="flex:1;min-width:170px"><label data-i18n="l.search"></label>
          <input id="flt-q" oninput="renderList()" data-ph="l.searchph"></div>
      </div>
      <div class="filters" style="margin-bottom:14px;align-items:center">
        <div class="seg" id="qrSeg">
          <button data-qr="month" onclick="quickRange('month')" data-i18n="qr.month"></button>
          <button data-qr="30" onclick="quickRange('30')" data-i18n="qr.30"></button>
          <button data-qr="year" onclick="quickRange('year')" data-i18n="qr.year"></button>
          <button data-qr="all" onclick="quickRange('all')" data-i18n="qr.all"></button>
          <button class="danger" onclick="clearFilters()" data-i18n="l.clear"></button>
        </div>
        <div style="flex:1"></div>
        <div class="view-tog" role="group">
          <button id="vtList" class="on" onclick="setView('list')" data-i18n="view.list"></button>
          <button id="vtCal" onclick="setView('cal')" data-i18n="view.cal"></button>
        </div>
      </div>
      <div id="listBox"></div>
      <div id="calBox" class="hidden"></div>
    </div>
  </section>

  <section id="tab-stat" class="hidden">
    <div class="filters"><div class="field"><label data-i18n="stat.year"></label>
      <select id="stat-year" onchange="renderStat()"></select></div></div>
    <div class="stats-cards" id="statCards"></div>
    <div class="card"><div class="chart-title" data-i18n="heatTitle"></div>
      <div id="heatmap" class="heatmap"></div>
      <div class="hm-legend"><span data-i18n="heatLess"></span>
        <span class="hm-c"></span><span class="hm-c l1"></span><span class="hm-c l2"></span>
        <span class="hm-c l3"></span><span class="hm-c l4"></span>
        <span data-i18n="heatMore"></span></div></div>
    <div class="card"><div class="chart-title" id="monthTitle"></div>
      <div class="month-chart" id="monthChart"></div>
      <div id="busiestStat" style="margin-top:14px;font-size:13px;color:var(--ink)"></div></div>
    <div class="grid">
      <div class="card"><div class="chart-title" data-i18n="byType"></div><div id="byType"></div></div>
      <div class="card"><div class="chart-title" data-i18n="byRole"></div><div id="byRole"></div></div>
      <div class="card"><div class="chart-title" data-i18n="byVenue"></div><div id="byVenue"></div></div>
      <div class="card"><div class="chart-title" data-i18n="byYear"></div><div id="byYear"></div></div>
    </div>
  </section>

  <section id="tab-set" class="hidden">
    <div class="card">
      <div class="chart-title" data-i18n="s.cloud"></div>
      <div class="note" style="margin-top:0;margin-bottom:12px" data-i18n="s.cloudNote"></div>
      <div class="field"><label data-i18n="s.supaUrl"></label>
        <input id="set-supaUrl" placeholder="https://xxxx.supabase.co"></div>
      <div class="field"><label data-i18n="s.supaKey"></label>
        <input id="set-supaKey" placeholder="eyJhbGci... (anon public key)"></div>
      <button class="rowbtn" style="margin-bottom:20px" data-i18n="migrate" onclick="migrateUp()"></button>
      <div class="note" style="margin-top:0;margin-bottom:12px" data-i18n="s.syncNote"></div>
      <div class="set-sync-info" id="setSyncInfo"></div>
      <button class="rowbtn primary" style="margin-bottom:4px" data-i18n="syncNow" onclick="manualSync()"></button>
      <div class="formfoot" style="margin-top:20px">
        <button class="primary" data-i18n="saveSet" onclick="saveSettings()"></button>
      </div>
    </div>
  </section>
</div>

<div id="toast"></div>
<div class="modal-bg" id="vsBg">
  <div class="modal"><p id="vsMsg"></p>
    <div class="mf">
      <button data-i18n="cancel" onclick="vsResolve('cancel')"></button>
      <button data-i18n="venueOne" onclick="vsResolve('one')"></button>
      <button class="primary" data-i18n="venueAll" onclick="vsResolve('all')"></button>
    </div>
  </div>
</div>
<div class="modal-bg" id="modalBg">
  <div class="modal"><p id="modalMsg"></p>
    <div class="mf">
      <button data-i18n="cancel" onclick="modalResolve(false)"></button>
      <button class="primary" data-i18n="ok" onclick="modalResolve(true)"></button>
    </div>
  </div>
</div>
<div class="drawer-bg" id="drawerBg" onclick="closeRec()"></div>
<div id="recDrawer" role="dialog" aria-modal="true" aria-labelledby="drTitle" tabindex="-1">

</div>

function initCloud(){
  if(SET.supaUrl&&SET.supaKey&&window.supabase){
    try{sb=window.supabase.createClient(SET.supaUrl,SET.supaKey);cloud=true;
      sb.auth.onAuthStateChange((_e,session)=>updateAuthUI(!!session));}
    catch(e){sb=null;cloud=false}
  }else{sb=null;cloud=false}
}
function updateAuthUI(authed){
  const g=document.getElementById('authGate');
  const so=document.getElementById('signOutBtn');
  const sy=document.getElementById('syncBtn');
  const lo=document.getElementById('loginBtn');
  if(!cloud){g.classList.add('hidden');so.classList.add('hidden');
    sy.classList.add('hidden');lo.classList.add('hidden');return}
  if(authed){g.classList.add('hidden');so.classList.remove('hidden');
    sy.classList.remove('hidden');lo.classList.add('hidden');
    pullCloud();syncGcal().then(()=>{pullCloud();markSynced();});}
  else{g.classList.remove('hidden');so.classList.add('hidden');
    sy.classList.add('hidden');lo.classList.remove('hidden');}
  renderSyncInfo();
}

async function syncGcal(){
  if(!cloud||!sb)return null;
  try{
    const {data}=await sb.auth.getSession();
    const tok=data&&data.session&&data.session.access_token;
    if(!tok)return null;
    const res=await fetch(SET.supaUrl.replace(/\/+$/,'')+'/functions/v1/sync-gcal',
      {method:'POST',headers:{Authorization:'Bearer '+tok}});
    return await res.json().catch(()=>({ok:false,error:'HTTP '+res.status}));
  }catch(e){console.warn('gcal sync',e);return{ok:false,error:String(e)}}
}
async function manualSync(){
  if(!cloud||!sb){toast(t('msg.needCloud'),'err');return}
  toast(t('msg.syncing'));
  const r=await syncGcal();
  if(r&&r.ok){await pullCloud();markSynced();
    toast(t('msg.syncOk',{s:r.scanned,i:r.inserted,u:r.updated}),'ok');}
  else toast(t('msg.syncFail')+(r&&r.error?': '+r.error:''),'err');
}
function markSynced(){
  localStorage.setItem(SYNC_TS_KEY,Date.now().toString());renderSyncInfo();
}
function relSync(){
  const raw=localStorage.getItem(SYNC_TS_KEY);
  if(!raw)return t('sync.never');
  const diff=Date.now()-parseInt(raw,10);
  if(diff<60000)return t('sync.justNow');
  const m=Math.floor(diff/60000);
  if(m<60)return t('sync.mins',{n:m});
  const h=Math.floor(m/60);
  if(h<24)return t('sync.hours',{n:h});
  return t('sync.days',{n:Math.floor(h/24)});
}
function renderSyncInfo(){
  const txt=t('lastSync')+': '+relSync();
  const a=document.getElementById('syncInfo');
  if(a){a.textContent=txt;a.classList.toggle('hidden',!cloud);}
  const b=document.getElementById('setSyncInfo');
  if(b)b.textContent=txt;
}
let _pushing=false,_pushAgain=false;
async function pushCloud(){
  if(!cloud)return;
  if(_pushing){_pushAgain=true;return}
  _pushing=true;
  try{
    const {data}=await sb.from('meetings').select('id');
    const local=new Set(DB.map(r=>r.id));
    const del=(data||[]).map(r=>r.id).filter(id=>!local.has(id));
    if(del.length)await sb.from('meetings').delete().in('id',del);
    if(DB.length)await sb.from('meetings').upsert(DB.map(_toRow));
  }catch(e){console.warn('pushCloud',e)}
  _pushing=false;
  if(_pushAgain){_pushAgain=false;pushCloud()}
}
async function pullCloud(){
  if(!cloud)return;
  try{
    const {data,error}=await sb.from('meetings').select('*');
    if(error)throw error;
    DB=(data||[]).map(_fromRow);
    localStorage.setItem(KEY,JSON.stringify(DB));
    updateCount();renderHero();
    const cur=document.querySelector('.tab.active');if(cur)switchTab(cur.dataset.tab);
  }catch(e){toast(t('msg.cloudErr'),'err')}
}
async function migrateUp(){
  if(!cloud){toast(t('msg.needCloud'),'err');return}
  if(!await ask(t('ask.migrate',{n:DB.length})))return;
  await pushCloud();toast(t('msg.migrated',{n:DB.length}),'ok');
}

// Free address autocomplete via OpenStreetMap Nominatim — only for in-person
// venues. No API key / billing / Google Cloud. Debounced to respect usage.
function venueLookup(){
  const inp=document.getElementById('f-venueDetail');
  const box=document.getElementById('vacBox');
  const offline=document.getElementById('v-off').checked;
  const q=inp.value.trim();
  clearTimeout(_vacT);
  if(!offline||q.length<3){box.classList.add('hidden');return}
  _vacT=setTimeout(async()=>{
    try{
      if(_vacAbort)_vacAbort.abort();
      _vacAbort=new AbortController();
      const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=6&q='
        +encodeURIComponent(q),{signal:_vacAbort.signal,
        headers:{'Accept':'application/json'}});
      const arr=await r.json();
      if(!Array.isArray(arr)||!arr.length){box.classList.add('hidden');return}
      box.innerHTML=arr.map(a=>`<div class="vac-item" onmousedown="pickVenue(this)" `
        +`data-v="${esc(a.display_name)}">${esc(a.display_name)}</div>`).join('');
      box.classList.remove('hidden');
    }catch(e){if(e.name!=='AbortError')box.classList.add('hidden')}
  },450);
}

  ['add','list','stat','set'].forEach(x=>{
    const el=document.getElementById('tab-'+x);
    if(x===tp){el.classList.remove('hidden');

    else el.classList.add('hidden');});
  if(tp==='list')renderList();
  if(tp==='stat')renderStat();
  if(tp==='set')renderSettings();
  // Force-reveal the cards of the tab we just switched to: the scroll-in
  // IntersectionObserver is unreliable for content that was display:none,
  // which left whole tabs (e.g. the list) stuck at opacity:0.
  document.querySelectorAll('#tab-'+tp+' .reveal').forEach(el=>el.classList.add('in'));
  observeReveals();
}

function genDates(startISO,untilISO,mode){
  const out=[],end=new Date(untilISO+'T00:00:00');
  let d=new Date(startISO+'T00:00:00'),guard=0;
  while(d<=end&&guard++<1000){
    const dow=d.getDay();
    if(mode!=='weekday'||(dow>=1&&dow<=5))out.push(
      d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+
      String(d.getDate()).padStart(2,'0'));
    if(mode==='weekly')d.setDate(d.getDate()+7);
    else if(mode==='monthly')d.setMonth(d.getMonth()+1);
    else d.setDate(d.getDate()+1);
  }
  return out;
}
async function saveRecord(){
  const name=document.getElementById('f-name').value.trim();
  const ds=document.getElementById('f-dateStart').value;
  if(!name){toast(t('msg.needName'),'err');return}
  if(!ds){toast(t('msg.needDate'),'err');return}
  const rec={id:document.getElementById('editId').value||uid(),
    type:document.getElementById('f-type').value,name,dateStart:ds,
    dateEnd:document.getElementById('f-dateEnd').value||'',
    venueMode:document.getElementById('v-on').checked?'线上':
              document.getElementById('v-off').checked?'线下':'',
    venueDetail:document.getElementById('f-venueDetail').value.trim(),
    role:document.getElementById('f-type').value==='conference'
         ?document.getElementById('f-role').value:'',
    notes:document.getElementById('f-notes').value.trim(),
    sourceId:'',createdAt:new Date().toISOString(),edited:true};
  // Recurrence: only when adding a NEW record (not editing). Generates one
  // independent row per occurrence so each can be edited/deleted on its own.
  const editing=!!document.getElementById('editId').value;
  const rep=document.getElementById('f-repeat').value;
  const until=document.getElementById('f-repeatUntil').value;
  if(!editing&&rep!=='none'&&until){
    const dates=genDates(ds,until,rep);
    if(!dates.length){toast(t('msg.needDate'),'err');return}
    dates.forEach(dt=>DB.push({...rec,id:uid(),dateStart:dt,dateEnd:'',edited:true}));
    persist();resetForm();updateCount();renderHero();
    toast(t('msg.batchAdded',{n:dates.length}),'ok');switchTab('list');return;
  }
  const i=DB.findIndex(r=>r.id===rec.id);
  if(i>=0){
    rec.sourceId=DB[i].sourceId||'';
    const old=DB[i];
    // Only a venue (mode/detail) change can fan out to same-name records.
    // notes & role stay unique per record — never bulk-applied / no prompt.
    const venueChanged=old.venueMode!==rec.venueMode
      ||(old.venueDetail||'')!==(rec.venueDetail||'');
    const same=DB.filter(r=>r.id!==rec.id&&(r.name||'').trim()===name);
    if(venueChanged&&same.length){
      const scope=await askVenueScope(same.length);
      if(scope==='cancel')return;                 // abort the save entirely
      DB[i]=rec;
      if(scope==='all')same.forEach(r=>{
        r.venueMode=rec.venueMode;r.venueDetail=rec.venueDetail;r.edited=true;});
    }else DB[i]=rec;
  }else DB.push(rec);
  persist();resetForm();updateCount();renderHero();
  toast(t('msg.saved'),'ok');switchTab('list');
}
function resetForm(){
  ['editId','f-name','f-dateStart','f-dateEnd','f-venueDetail','f-role','f-notes','f-repeatUntil']
    .forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-type').value='组会';
  document.getElementById('f-repeat').value='none';
  document.querySelectorAll('input[name=venue]').forEach(r=>r.checked=false);
  document.getElementById('cancelBtn').classList.add('hidden');
  applyTypeDefault();checkDup();
}

let _undoRec=null,_undoT;
async function delRecord(id){
  if(!await ask(t('ask.del')))return;

function toastUndo(){

    +` <button id="undoBtn" style="margin-left:12px;font-size:12.5px;padding:4px 12px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);color:#fff">${esc(t('undo.act'))}</button>`;

function fmtDate(r){return r.dateEnd&&r.dateEnd!==r.dateStart
  ?r.dateStart+' ~ '+r.dateEnd:r.dateStart}
function esc(s){return(s||'').replace(/[&<>"]/g,
  c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function lDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')
  +'-'+String(d.getDate()).padStart(2,'0')}

function refreshYearFilter(){
  const yrs=[...new Set(DB.map(r=>(r.dateStart||'').slice(0,4)).filter(Boolean))]
    .sort().reverse();
  ['flt-year','stat-year'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    const cur=sel.value;
    sel.innerHTML=`<option value="">${t('all')}</option>`
      +yrs.map(y=>`<option>${y}</option>`).join('');
    sel.value=cur;

let _lpg=1,_lsig='',_lday='',_view='list',_qr30=false;const LPG=40;
function linkify(s){return esc(s).replace(/(https?:\/\/[^\s<]+)/g,
  '<a href="$1" target="_blank" rel="noopener">$1</a>');}
function monLabel(m){return t('mon.'+m)}
function monShort(m){return t('monShort.'+m)}
function refreshMonthFilter(){
  const sel=document.getElementById('flt-month');if(!sel)return;
  const cur=sel.value;
  let h=`<option value="">${t('l.allMonths')}</option>`;
  for(let m=1;m<=12;m++)h+=`<option value="${m}">${monLabel(m)}</option>`;
  sel.innerHTML=h;sel.value=cur;
}
function listFiltered(){
  const y=document.getElementById('flt-year').value,
        mo=document.getElementById('flt-month').value,
        tp=document.getElementById('flt-type').value,
        q=document.getElementById('flt-q').value.trim().toLowerCase(),
        so=document.getElementById('flt-sort').value;
  const sig=[y,mo,tp,q,so,_lday,_qr30].join('|');
  if(sig!==_lsig){_lpg=1;_lsig=sig;}
  const mm=mo?String(mo).padStart(2,'0'):'';
  let cut='';
  if(_qr30){const c=new Date();c.setDate(c.getDate()-30);cut=lDate(c);}
  let rows=DB.filter(r=>{
    const d=r.dateStart||'';
    if(_lday)return d.slice(0,10)===_lday;
    if(cut&&d.slice(0,10)<cut)return false;
    return(!y||d.startsWith(y))&&(!mm||d.slice(5,7)===mm)&&(!tp||r.type===tp)&&
      (!q||((r.name||'')+' '+(r.notes||'')+' '+(r.venueDetail||'')).toLowerCase().includes(q));
  });
  rows.sort((a,b)=>so==='nm'?(a.name||'').localeCompare(b.name||'')
    :so==='da'?(a.dateStart||'').localeCompare(b.dateStart||'')
    :(b.dateStart||'').localeCompare(a.dateStart||''));
  return rows;
}
function lrowHtml(r){
  const vp=r.venueMode?`<span class="pill ${r.venueMode==='线上'?'on':'off'}">${r.venueMode==='线上'?t('online'):t('offline')}</span> `:'';
  const prev=esc(r.venueDetail||'');
  return `<div class="lrow lcols" role="button" tabindex="0" aria-label="${esc(t('a.openRec'))}"
      onclick="openRec('${r.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openRec('${r.id}')}">
    <span class="ld">${esc(fmtDate(r))}</span>
    <span class="lty"><span class="pill">${esc(typeLabel(r.type))}</span></span>
    <span class="lnm">${esc(r.name)}</span>
    <span class="lpv">${vp}${prev}</span>
    <span class="lrl">${r.role?esc(r.role):''}</span></div>`;
}
function renderList(){
  refreshYearFilter();refreshMonthFilter();
  if(_view==='cal'){renderCalendar();return}
  const rows=listFiltered(),box=document.getElementById('listBox');
  const head=`<div class="lhead lcols">
    <span>${t('c.date')}</span><span>${t('c.type')}</span><span>${t('c.name')}</span>
    <span>${t('c.loc')}</span><span>${t('c.role')}</span></div>`;
  if(_lday){
    const dh=`<div class="dayhead">${esc(_lday)} <span class="mc">· ${rows.length}</span></div>`;
    if(!rows.length){box.innerHTML=dh+
      `<div class="empty"><div class="big">📭</div>${t('day.empty')}</div>`;return}
    box.innerHTML=dh+head+rows.map(lrowHtml).join('');return;
  }
  if(!rows.length){box.innerHTML=
    `<div class="empty"><div class="big">🗓️</div>${t('l.empty')}</div>`;return}
  const shown=rows.slice(0,_lpg*LPG);
  let html=head,curKey='';
  shown.forEach(r=>{
    const ym=(r.dateStart||'').slice(0,7);
    if(ym!==curKey){
      curKey=ym;
      const yy=ym.slice(0,4),mm=parseInt(ym.slice(5,7),10);
      const cnt=rows.filter(x=>(x.dateStart||'').slice(0,7)===ym).length;
      const lbl=ym?t('mlab',{m:monShort(mm),y:yy}):'—';
      html+=`<div class="lmon"><span>${esc(lbl)}</span><span class="mc">${cnt}</span></div>`;
    }
    html+=lrowHtml(r);
  });
  box.innerHTML=html+(rows.length>shown.length
    ?`<button class="more-btn" onclick="loadMoreList()">${t('loadMore',{n:rows.length-shown.length})}</button>`:'');

function loadMoreList(){_lpg++;renderList();}
function setView(v){

let _calY,_calM;
function calShift(d){
  let m=_calM+d,y=_calY;
  if(m<0){m=11;y--}else if(m>11){m=0;y++}
  _calM=m;_calY=y;renderCalendar();
}
function renderCalendar(){
  const box=document.getElementById('calBox');
  const now=new Date();
  if(_calY==null){
    const fy=parseInt(document.getElementById('flt-year').value,10);
    const fm=parseInt(document.getElementById('flt-month').value,10);
    _calY=fy||now.getFullYear();
    _calM=(fm?fm-1:now.getMonth());
  }
  const cnt={};
  DB.forEach(r=>{const d=(r.dateStart||'').slice(0,10);if(d)cnt[d]=(cnt[d]||0)+1});
  const first=new Date(_calY,_calM,1);
  const startDow=first.getDay();
  const dim=new Date(_calY,_calM+1,0).getDate();
  const wd=['wk.sun','wk.mon','wk.tue','wk.wed','wk.thu','wk.fri','wk.sat'];
  const todayISO=lDate(now);
  let cells='';
  for(let i=0;i<startDow;i++)cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=dim;d++){
    const iso=_calY+'-'+String(_calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const c=cnt[iso]||0;
    cells+=`<div class="cal-cell${c?' has':''}${iso===todayISO?' today':''}"
      ${c?`onclick="goList({day:'${iso}'})" title="${iso}: ${c}"`:''}>
      <span class="dn">${d}</span>
      ${c?`<span class="cal-badge">${c}</span>`:''}</div>`;
  }
  box.innerHTML=`<div class="cal-nav">
    <button onclick="calShift(-1)" aria-label="${esc(t('cal.prev'))}">‹</button>
    <span class="ttl">${esc(t('cal.title',{m:monLabel(_calM+1),y:_calY}))}</span>
    <button onclick="calShift(1)" aria-label="${esc(t('cal.next'))}">›</button></div>
    <div class="cal-grid">${wd.map(w=>`<div class="cal-wd">${t(w)}</div>`).join('')}${cells}</div>`;
}

function quickRange(k){

function goList(opt){
  opt=opt||{};
  switchTab('list');
  setView('list');
  document.getElementById('flt-type').value=opt.type||'';
  document.getElementById('flt-q').value=opt.q||'';
  const ys=document.getElementById('flt-year');

function updateCount(){document.getElementById('cnt').textContent=DB.length?`(${DB.length})`:''}

function countUp(el,to){
  const dur=620,t0=performance.now();
  (function step(tt){const p=Math.min(1,(tt-t0)/dur);
    el.textContent=Math.round(to*(1-Math.pow(1-p,3)));
    if(p<1)requestAnimationFrame(step);})(t0);
}
function statYear(){const e=document.getElementById('stat-year');return e?e.value:'';}
function statData(){
  const sy=statYear();
  const D=sy?DB.filter(r=>(r.dateStart||'').startsWith(sy)):DB;
  const yr=sy||new Date().getFullYear().toString();
  return[
    {n:D.length,l:t('st.total'),go:sy?{year:sy}:{}},
    {n:D.filter(r=>r.type==='conference').length,l:t('st.conf'),go:{type:'conference',year:sy}},
    {n:D.filter(r=>r.type==='组内报告'||['oral','poster'].includes(r.role)).length,
     l:t('st.talks'),go:{type:'组内报告',year:sy}},
    {n:DB.filter(r=>(r.dateStart||'').startsWith(yr)).length,
     l:t('st.year',{y:yr}),go:{year:yr}}
  ];
}
function renderHero(){
  const d=statData(),box=document.getElementById('heroStats');
  box.innerHTML=d.map(s=>
    `<div class="hs"><span class="n">0</span><span class="l">${s.l}</span></div>`).join('');
  [...box.querySelectorAll('.n')].forEach((el,i)=>countUp(el,d[i].n));
}
function cbars(c,items){
  if(!items.length){c.innerHTML=`<div class="empty" style="padding:24px">${t('nodata')}</div>`;return}
  const max=Math.max(1,...items.map(i=>i.v));
  c.innerHTML=items.map(i=>`<div class="bar-row"${i.go
      ?` style="cursor:pointer" onclick='goList(${JSON.stringify(i.go)})'`:''}>
    <div class="lab">${esc(i.k)}</div>
    <div class="bar-track"><div class="bar-fill" data-w="${i.v/max*100}"></div></div>
    <div class="val">${i.v}</div></div>`).join('');
  requestAnimationFrame(()=>c.querySelectorAll('.bar-fill')
    .forEach(b=>b.style.width=b.dataset.w+'%'));
}
function renderStat(){
  refreshYearFilter();
  const sy=statYear();
  const D=sy?DB.filter(r=>(r.dateStart||'').startsWith(sy)):DB;
  const d=statData();
  document.getElementById('statCards').innerHTML=d.map(s=>
    `<div class="stat" onclick='goList(${JSON.stringify(s.go||{})})'>`
    +`<div class="n">0</div><div class="l">${s.l}</div></div>`).join('');
  document.querySelectorAll('#statCards .n').forEach((el,i)=>countUp(el,d[i].n));
  const yr=sy||new Date().getFullYear().toString();
  document.getElementById('monthTitle').textContent=t('monthly.y',{y:yr});
  const mc=new Array(12).fill(0);
  const dayCnt={};
  DB.forEach(r=>{
    const ds=(r.dateStart||'');
    if(ds.startsWith(yr)){
      const m=parseInt(ds.slice(5,7),10)-1;if(m>=0&&m<12)mc[m]++;
      const dd=ds.slice(0,10);if(dd)dayCnt[dd]=(dayCnt[dd]||0)+1;
    }});
  const mmax=Math.max(1,...mc);
  document.getElementById('monthChart').innerHTML=mc.map((v,i)=>
    `<div class="mbar" style="cursor:pointer"
      title="${esc(monLabel(i+1))} ${yr}: ${v}"
      onclick='goList(${JSON.stringify({year:yr,month:i+1})})'>
    <div class="mv">${v||''}</div><div class="fill" data-h="${v/mmax*100}"></div>
    <div class="mn">${monShort(i+1)}</div></div>`).join('');
  requestAnimationFrame(()=>document.querySelectorAll('#monthChart .fill')
    .forEach(f=>f.style.height=f.dataset.h+'%'));
  // Busiest day insight
  let bDay='',bN=0;
  for(const k in dayCnt)if(dayCnt[k]>bN){bN=dayCnt[k];bDay=k;}
  const bel=document.getElementById('busiestStat');
  if(bel)bel.innerHTML=`<span class="bz-k">${t('busiest')}</span> `
    +(bDay?`<span class="bz-v" style="cursor:pointer" onclick='goList({day:"${bDay}"})'>${esc(bDay)} · ${bN}</span>`
          :`<span class="bz-v">${t('busiest.none')}</span>`);
  const agg=fn=>{const o={};D.forEach(r=>{const k=fn(r);if(k!=null&&k!=='')o[k]=(o[k]||0)+1});return o;};
  const bt=agg(r=>r.type);
  cbars(document.getElementById('byType'),Object.keys(bt).sort((a,b)=>bt[b]-bt[a])
    .map(k=>({k:typeLabel(k),v:bt[k],go:{type:k,year:sy}})));
  const br=agg(r=>r.type==='conference'?(r.role||'(—)'):null);
  cbars(document.getElementById('byRole'),Object.keys(br).sort((a,b)=>br[b]-br[a])
    .map(k=>({k,v:br[k]})));
  const bv=agg(r=>r.venueMode||null);
  cbars(document.getElementById('byVenue'),Object.keys(bv).sort((a,b)=>bv[b]-bv[a])
    .map(k=>({k:k==='线上'?t('online'):k==='线下'?t('offline'):k,v:bv[k]})));
  const by={};DB.forEach(r=>{const k=(r.dateStart||'').slice(0,4);if(k)by[k]=(by[k]||0)+1});
  cbars(document.getElementById('byYear'),Object.keys(by).sort().reverse()
    .map(k=>({k,v:by[k],go:{year:k}})));
  renderHeatmap();
  observeReveals();
}
function renderHeatmap(){
  const box=document.getElementById('heatmap');if(!box)return;
  const cnt={};
  DB.forEach(r=>{const d=(r.dateStart||'').slice(0,10);if(d)cnt[d]=(cnt[d]||0)+1});
  const max=Math.max(1,...Object.values(cnt));
  const lvl=v=>!v?'':v>=max*.75?' l4':v>=max*.5?' l3':v>=max*.25?' l2':' l1';
  const end=new Date();end.setHours(0,0,0,0);
  const start=new Date(end);start.setDate(start.getDate()-52*7-end.getDay());
  let mrow='<div class="hm-months">',grid='<div class="hm-grid">';
  let cur=new Date(start),lastM=-1;
  for(let w=0;w<53;w++){
    const m=cur.getMonth();
    const lab=(m!==lastM)?monShort(m+1):'';
    lastM=m;
    mrow+=`<div class="hm-mc">${lab}</div>`;
    grid+='<div class="hm-col">';
    for(let dy=0;dy<7;dy++){
      const iso=lDate(cur);
      const v=cur<=end?(cnt[iso]||0):-1;
      grid+=v<0?'<div class="hm-c" style="visibility:hidden"></div>'
        :`<div class="hm-c${lvl(v)}" title="${iso}: ${v}"`
          +(v>0?` style="cursor:pointer" onclick="goList({day:'${iso}'})"`:'')
          +`></div>`;
      cur.setDate(cur.getDate()+1);
    }
    grid+='</div>';
  }
  box.innerHTML='<div class="hm-wrap">'+mrow+'</div>'+grid+'</div></div>';
}

function importJSON(ev){
  const f=ev.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=async()=>{try{
    const arr=JSON.parse(rd.result);if(!Array.isArray(arr))throw 0;
    if(!await ask(t('ask.import',{n:arr.length,m:DB.length})))return;
    DB=arr;persist();updateCount();renderHero();renderList();
    toast(t('msg.imported'),'ok');switchTab('list');

  rd.readAsText(f);ev.target.value='';
}

const _io=new IntersectionObserver(es=>es.forEach(e=>{
  if(e.isIntersecting){e.target.classList.add('in');_io.unobserve(e.target)}
}),{threshold:.08,rootMargin:'0px 0px -40px 0px'});
function observeReveals(){
  document.querySelectorAll('.reveal:not(.in)').forEach(el=>_io.observe(el));
}
document.querySelectorAll('section .card').forEach(el=>el.classList.add('reveal'));
document.getElementById('modalBg').addEventListener('click',e=>{
  if(e.target.id==='modalBg')modalResolve(false)});
document.getElementById('vsBg').addEventListener('click',e=>{
  if(e.target.id==='vsBg')vsResolve('cancel')});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(recDrawerOpen()){closeRec();return}
    if(document.getElementById('modalBg').classList.contains('show')){
      modalResolve(false);return}
    if(document.getElementById('vsBg').classList.contains('show')){
      vsResolve('cancel');return}
  }
  const tag=(e.target.tagName||'').toLowerCase();
  const typing=tag==='input'||tag==='textarea'||tag==='select'||e.target.isContentEditable;
  if(!typing&&(e.key==='n'||e.key==='N')&&!e.metaKey&&!e.ctrlKey&&!e.altKey){
    if(recDrawerOpen())return;
    e.preventDefault();switchTab('add');
    const nm=document.getElementById('f-name');if(nm)nm.focus();
  }
});
applyLang();resetForm();updateCount();renderHero();observeReveals();
initCloud();refreshAuthGate();
</script>
</body>
</html>
